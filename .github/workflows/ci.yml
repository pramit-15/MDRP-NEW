name: MDRP CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: mdrp_user
          POSTGRES_PASSWORD: mdrp_password
          POSTGRES_DB: mdrp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 app/ api.py --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 app/ api.py --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Run DB Migrations
      env:
        DATABASE_URL: postgresql+psycopg://mdrp_user:mdrp_password@localhost:5432/mdrp_test
      run: |
        alembic upgrade head

    - name: Test with pytest
      env:
        TEST_DATABASE_URL: postgresql+psycopg://mdrp_user:mdrp_password@localhost:5432/mdrp_test
        DATABASE_URL: postgresql+psycopg://mdrp_user:mdrp_password@localhost:5432/mdrp_test
        FLASK_ENV: testing
        MDRP_DEBUG: 1
      run: |
        pytest --cov=app tests/

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint Next.js
      run: npm run lint

    - name: Build Next.js
      run: npm run build
      env:
        NEXT_TELEMETRY_DISABLED: 1
        
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test
